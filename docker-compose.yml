services:
  # Capital Consultancy AG — React/Vite static frontend
  capital-consultancy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: capital_consultancy_app
    restart: unless-stopped
    ports:
      # Host port 3333 → container port 3000 (React/Vite)
      # Host Nginx then reverse-proxies from 443 → 127.0.0.1:3333
      - "3333:3000"
    networks:
      - capital_consultancy_network

networks:
  capital_consultancy_network:
    driver: bridge
