server {
    listen 80;
    server_name capital-consultancy.com www.capital-consultancy.com;

    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;

    # Cache hashed Vite assets aggressively (immutable, content-addressed)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000" always;
        try_files $uri =404;
    }

    # Cache images with longer TTL (30 days)
    location ~* \.(?:png|jpg|jpeg|gif|svg|ico|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # Cache other static resources with 7d TTL
    location ~* \.(?:css|js|mjs|json|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # Keep HTML non-cached so new deploys are discovered quickly
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    # Cache sitemap and robots.txt for 1 day
    location = /sitemap.xml {
        add_header Cache-Control "public, max-age=86400";
        add_header Content-Type "application/xml";
        try_files $uri =404;
    }

    location = /robots.txt {
        add_header Cache-Control "public, max-age=86400";
        add_header Content-Type "text/plain";
        try_files $uri =404;
    }

    # Global security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SPA routing (React / Vite)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}