# =============================================================================
# Nginx configuration — container-internal (served by nginx:alpine)
# Handles SPA routing (React Router) + static asset caching
# =============================================================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    server_tokens   off;

    # Gzip compression
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml+rss
        application/rss+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        image/svg+xml;

    server {
        listen 80;
        root   /usr/share/nginx/html;
        index  index.html;

        # Security headers (also present on host nginx, belt-and-suspenders)
        add_header X-Frame-Options        "SAMEORIGIN"                        always;
        add_header X-Content-Type-Options "nosniff"                           always;
        add_header X-XSS-Protection       "1; mode=block"                     always;
        add_header Referrer-Policy        "strict-origin-when-cross-origin"   always;

        # ---- SPA routing ------------------------------------------------
        # All unknown paths fall back to index.html so React Router handles them
        location / {
            try_files $uri $uri/ /index.html;
        }

        # ---- Cache Vite-hashed static assets forever --------------------
        # Vite appends a content hash to every JS/CSS file name, so they
        # are safe to cache indefinitely.
        location ~* \.(js|css)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ---- Cache media / fonts ----------------------------------------
        location ~* \.(woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|webp|ico)$ {
            expires 6M;
            add_header Cache-Control "public";
            access_log off;
        }

        # ---- Deny hidden files ------------------------------------------
        location ~ /\. {
            deny all;
        }
    }
}
