version: '3.8'

services:
  # DATABASE SERVICE
  postgres:
    image: postgres:16-alpine
    container_name: app-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-app_db}
      POSTGRES_USER: ${DB_USER:-app_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-app_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # APPLICATION SERVICE
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-app_user}:${DB_PASSWORD:-changeme}@postgres:5432/${DB_NAME:-app_db}
    ports:
      - "3000:3000"
    networks:
      - app-network
    volumes:
      - ./prisma/migrations:/app/prisma/migrations

volumes:
  postgres_data:
    driver: local

networks:
  app-network:
    driver: bridge
