version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: crm-app-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-crm_db}
      POSTGRES_USER: ${DB_USER:-crm_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-crm1234}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - crm-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-crm_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  crm-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crm-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-crm_user}:${DB_PASSWORD:-crm1234}@postgres:5432/${DB_NAME:-crm_db}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3092}
    ports:
      - "3092:3000"
    networks:
      - crm-network
    volumes:
      - ./prisma/migrations:/app/prisma/migrations
    command: sh -c "npm run prisma:migrate && npm start"

volumes:
  postgres_data:
    driver: local

networks:
  crm-network:
    driver: bridge